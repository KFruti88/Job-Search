<div id="wp-custom-wrapper">
    <div id="hustle-display-container">
        <!-- Career Status Header -->
        <div id="career-milestone-header">
            <h2 class="hustle-title">Job Search Tracker</h2>
            <div class="milestone-sub">
                Last Day of Work: <strong>June 4th, 2025</strong>
            </div>
            <div id="weeks-counter-box" class="weeks-glow">
                <span id="weeks-count">0</span> Weeks Since Last Job
            </div>
        </div>
        
        <!-- Stats Summary Badges -->
        <div class="hustle-platform-stats">
            <div class="platform-badge total-glow">Total: <span id="count-total">0</span></div>
            <div class="platform-badge applied-glow">Applied: <span id="count-applied">0</span></div>
            <div class="platform-badge interview-glow">Interviews: <span id="count-interview">0</span></div>
            <div class="platform-badge rejected-glow">Rejected: <span id="count-rejected">0</span></div>
        </div>

        <!-- Activity Section -->
        <h3 class="activity-label">Recent Activity <span style="font-size: 0.6rem; opacity: 0.5; float: right; text-transform: none;">Tap job for details</span></h3>
        <div id="hustle-job-list-container">
            <div id="hustle-job-list"></div>
        </div>
    </div>
</div>

<style>
/* Reset & Container */
#wp-custom-wrapper #hustle-display-container {
    width: 90%;
    max-width: 800px;
    margin: 20px auto;
    padding: 25px;
    background: rgba(0, 0, 0, 0.9);
    border: 2px solid #00f2ff;
    border-radius: 15px;
    box-shadow: 0 0 25px rgba(0, 242, 255, 0.4);
    color: #fff;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    box-sizing: border-box;
}

/* Milestone Header */
#wp-custom-wrapper .hustle-title { 
    text-align: center; 
    color: #00f2ff; 
    text-shadow: 0 0 10px #00f2ff; 
    text-transform: uppercase; 
    margin: 0 0 5px 0; 
    font-size: 1.8rem;
}
#wp-custom-wrapper .milestone-sub { text-align: center; font-size: 0.9rem; opacity: 0.7; margin-bottom: 10px; }

#wp-custom-wrapper #weeks-counter-box {
    text-align: center;
    padding: 15px;
    background: rgba(255, 215, 0, 0.05);
    border-radius: 12px;
    margin-bottom: 25px;
    font-weight: bold;
    font-size: 1.4rem;
    border: 1px solid rgba(255, 215, 0, 0.3);
}
#wp-custom-wrapper .weeks-glow { color: #ffd700; text-shadow: 0 0 12px rgba(255, 215, 0, 0.6); }

/* Stats Row */
#wp-custom-wrapper .hustle-platform-stats { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
#wp-custom-wrapper .platform-badge { padding: 8px 12px; border-radius: 20px; font-weight: bold; border: 1px solid; background: rgba(0,0,0,0.6); font-size: 0.75rem; transition: transform 0.2s; }

#wp-custom-wrapper .total-glow { border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.2); color: #fff; }
#wp-custom-wrapper .applied-glow { border-color: #00f2ff; box-shadow: 0 0 10px #00f2ff; color: #00f2ff; }
#wp-custom-wrapper .interview-glow { border-color: #ff00ff; box-shadow: 0 0 15px #ff00ff; color: #ff00ff; }
#wp-custom-wrapper .rejected-glow { border-color: #ff4d4d; box-shadow: 0 0 10px #ff4d4d; color: #ff4d4d; }

/* Activity Label */
#wp-custom-wrapper .activity-label {
    margin-top: 25px;
    font-size: 0.9rem;
    color: #00f2ff;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid rgba(0, 242, 255, 0.3);
    padding-bottom: 8px;
}

/* Scrollable List */
#wp-custom-wrapper #hustle-job-list-container {
    max-height: 500px;
    overflow-y: auto;
    padding-right: 8px;
    margin-top: 15px;
}
#wp-custom-wrapper #hustle-job-list-container::-webkit-scrollbar { width: 5px; }
#wp-custom-wrapper #hustle-job-list-container::-webkit-scrollbar-thumb { background: #00f2ff; border-radius: 10px; }

/* Job Entries */
.job-entry-row {
    padding: 15px 10px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    cursor: pointer;
    transition: background 0.3s;
    border-radius: 8px;
    margin-bottom: 2px;
}
.job-entry-row:hover { background: rgba(255, 255, 255, 0.05); }

.job-main-info { display: flex; justify-content: space-between; align-items: flex-start; }
.job-details-stack { display: flex; flex-direction: column; gap: 4px; }
.job-status-pill { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; border: 1px solid; }

/* Preview Snippet - Collapsible */
.job-snippet-preview {
    max-height: 0;
    overflow: hidden;
    font-size: 0.85rem;
    color: #ddd;
    margin-top: 0;
    background: rgba(255, 255, 255, 0.05);
    border-left: 3px solid #00f2ff;
    padding: 0;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    opacity: 0;
    border-radius: 0 4px 4px 0;
}

/* Active State for toggle */
.job-entry-row.active { background: rgba(0, 242, 255, 0.05); }
.job-entry-row.active .job-snippet-preview {
    max-height: 200px; /* Allow room for description */
    margin-top: 12px;
    padding: 10px;
    opacity: 1;
}

/* Mobile Optimizations */
@media (max-width: 600px) {
    #wp-custom-wrapper #hustle-display-container {
        width: 95%;
        aspect-ratio: 1/1; 
        display: flex;
        flex-direction: column;
        padding: 15px;
    }
    #wp-custom-wrapper .hustle-title { font-size: 1.3rem; }
    #wp-custom-wrapper #weeks-counter-box { font-size: 1.1rem; padding: 10px; margin-bottom: 15px; }
    #wp-custom-wrapper .platform-badge { font-size: 0.65rem; padding: 5px 10px; }
    #wp-custom-wrapper #hustle-job-list-container { flex: 1; max-height: none; }
}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
(function() {
    // 1. Weeks Since Logic
    const lastDay = new Date("June 4, 2025").getTime();
    function updateWeeks() {
        const now = new Date().getTime();
        const diffInMs = now - lastDay;
        const weeks = Math.floor(diffInMs / (1000 * 60 * 60 * 24 * 7));
        document.getElementById('weeks-count').innerText = weeks;
    }
    updateWeeks();

    // 2. Firebase Initialization
    const config = { databaseURL: "https://job-hustle-tracker-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) { firebase.initializeApp(config, 'hustleViewer'); }
    const db = firebase.app('hustleViewer').database();

    db.ref("applications").on("value", (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        const entries = Object.values(data);
        let applied = 0, interview = 0, rejected = 0;

        entries.forEach(job => {
            if (job.status === "Interview Scheduled") interview++;
            else if (job.status === "Rejected") rejected++;
            else applied++;
        });

        document.getElementById('count-total').innerText = entries.length;
        document.getElementById('count-applied').innerText = applied;
        document.getElementById('count-interview').innerText = interview;
        document.getElementById('count-rejected').innerText = rejected;

        const list = document.getElementById('hustle-job-list');
        list.innerHTML = "";
        
        // Reverse to show newest at the top
        entries.sort((a, b) => b.timestamp - a.timestamp).forEach(job => {
            const isInterview = job.status === "Interview Scheduled";
            const isRejected = job.status === "Rejected";
            const color = isInterview ? "#ff00ff" : (isRejected ? "#ff4d4d" : "#00f2ff");
            const dateStr = new Date(job.timestamp).toLocaleDateString();
            
            // Fallback for snippet if it doesn't exist yet in the DB entry
            const snippet = job.snippet || "No additional preview text found. This entry might have been synced before the snippet feature was active.";

            const row = document.createElement('div');
            row.className = 'job-entry-row';
            
            // Standard click/tap handler for mobile friendliness
            row.addEventListener('click', function(e) {
                // Don't toggle if they click a direct link inside the row
                if (e.target.tagName !== 'A') {
                   this.classList.toggle('active');
                }
            });

            row.innerHTML = `
                <div class="job-main-info">
                    <div class="job-details-stack">
                        <span style="color:${color}; font-weight:bold; text-shadow: 0 0 5px ${color}; font-size: 1.05rem;">
                            ${job.company}
                        </span>
                        <span style="font-size:0.75rem; opacity:0.5;">
                            ${isInterview ? '📅' : (isRejected ? '❌' : '📩')} ${dateStr}
                        </span>
                    </div>
                    <div class="job-status-pill" style="color:${color}; border-color:${color};">
                        ${isInterview ? 'Interview' : job.status}
                    </div>
                </div>
                <div class="job-snippet-preview">
                    <div style="color:${color}; font-weight:bold; font-size:0.7rem; margin-bottom:5px; text-transform:uppercase;">Email Description:</div>
                    ${snippet}
                </div>
            `;
            list.appendChild(row);
        });
    });
})();
</script>
