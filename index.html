<div id="wp-custom-wrapper">
    <div id="hustle-display-container">
        <div id="career-milestone-header">
            <h2 class="hustle-title">Job Search Tracker</h2>
            <div class="milestone-sub">
                Last Day of Work: <strong>June 4th, 2025</strong>
            </div>
            <div id="weeks-counter-box" class="weeks-glow">
                <span id="weeks-count">0</span> Weeks Since Last Job
            </div>
        </div>
        
        <div class="hustle-platform-stats">
            <div class="platform-badge applied-glow">Applied: <span id="count-applied">0</span></div>
            <div class="platform-badge interview-glow">Interviews: <span id="count-interview">0</span></div>
            <div class="platform-badge rejected-glow">Rejected: <span id="count-rejected">0</span></div>
        </div>

        <div class="hustle-stats-row" style="margin-top: 25px; display: flex; justify-content: space-between; font-weight: bold; font-size: 1.1rem;">
            <span>Monthly Progress:</span>
            <span id="app-count-text">0 / 20</span>
        </div>
        <div class="hustle-progress-bar">
            <div id="hustle-progress-fill"></div>
        </div>

        <div id="hustle-job-list"></div>
    </div>
</div>

<style>
#wp-custom-wrapper #hustle-display-container {
    width: 90%;
    margin: 20px auto;
    padding: 25px;
    background: rgba(0, 0, 0, 0.85);
    border: 2px solid #00f2ff;
    border-radius: 15px;
    box-shadow: 0 0 20px #00f2ff;
    color: #fff;
    font-family: sans-serif;
}

#wp-custom-wrapper .hustle-title { 
    text-align: center; 
    color: #00f2ff; 
    text-shadow: 0 0 10px #00f2ff; 
    text-transform: uppercase; 
    margin-bottom: 5px; 
}

#wp-custom-wrapper .milestone-sub {
    text-align: center;
    font-size: 0.9rem;
    opacity: 0.8;
    margin-bottom: 10px;
}

/* Weeks Counter Styling */
#wp-custom-wrapper #weeks-counter-box {
    text-align: center;
    padding: 12px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 10px;
    margin-bottom: 25px;
    font-weight: bold;
    font-size: 1.3rem;
    border: 1px solid rgba(0, 242, 255, 0.3);
}

#wp-custom-wrapper .weeks-glow {
    color: #ffd700; 
    text-shadow: 0 0 10px rgba(255, 215, 0, 0.7);
}

#wp-custom-wrapper .hustle-platform-stats { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
#wp-custom-wrapper .platform-badge { padding: 8px 15px; border-radius: 20px; font-weight: bold; border: 1px solid; background: rgba(0,0,0,0.5); font-size: 0.8rem; }
#wp-custom-wrapper .applied-glow { border-color: #00f2ff; box-shadow: 0 0 10px #00f2ff; color: #00f2ff; }
#wp-custom-wrapper .interview-glow { border-color: #ff00ff; box-shadow: 0 0 15px #ff00ff; color: #ff00ff; }
#wp-custom-wrapper .rejected-glow { border-color: #ff4d4d; box-shadow: 0 0 10px #ff4d4d; color: #ff4d4d; }
#wp-custom-wrapper .hustle-progress-bar { width: 100%; height: 12px; background: #111; border-radius: 6px; margin: 15px 0 20px 0; overflow: hidden; }
#wp-custom-wrapper #hustle-progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00f2ff, #7000ff); box-shadow: 0 0 10px #00f2ff; transition: width 1s ease; }

@media (max-width: 600px) { #wp-custom-wrapper #hustle-display-container { aspect-ratio: 1/1; display: flex; flex-direction: column; justify-content: center; } }
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
(function() {
    // 1. Calculate Weeks Since June 4, 2025
    const lastDay = new Date("June 4, 2025").getTime();
    
    function updateWeeks() {
        const now = new Date().getTime();
        const diffInMs = now - lastDay;
        
        // Calculate weeks (ms / ms_in_a_week)
        const weeks = Math.floor(diffInMs / (1000 * 60 * 60 * 24 * 7));
        document.getElementById('weeks-count').innerText = weeks;
    }
    updateWeeks();

    // 2. Firebase Connection
    const config = { databaseURL: "https://job-hustle-tracker-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) { firebase.initializeApp(config, 'hustleViewer'); }
    const db = firebase.app('hustleViewer').database();

    db.ref("applications").on("value", (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        const entries = Object.values(data);
        let applied = 0, interview = 0, rejected = 0;

        entries.forEach(job => {
            if (job.status === "Interview Scheduled") interview++;
            else if (job.status === "Rejected") rejected++;
            else applied++;
        });

        document.getElementById('count-applied').innerText = applied;
        document.getElementById('count-interview').innerText = interview;
        document.getElementById('count-rejected').innerText = rejected;
        document.getElementById('app-count-text').innerText = `${entries.length} / ${goal = 20}`;
        document.getElementById('hustle-progress-fill').style.width = Math.min((entries.length/20)*100, 100) + "%";

        const list = document.getElementById('hustle-job-list');
        list.innerHTML = "";
        
        entries.reverse().slice(0, 10).forEach(job => {
            const isInterview = job.status === "Interview Scheduled";
            const isRejected = job.status === "Rejected";
            let color = isInterview ? "#ff00ff" : (isRejected ? "#ff4d4d" : "#00f2ff");
            const hasLink = (job.jobUrl && job.jobUrl !== "#");

            const nameHTML = hasLink 
                ? `<a href="${job.jobUrl}" target="_blank" style="color:${color}; text-decoration:none; font-weight:bold; text-shadow:0 0 5px ${color};">${job.company}</a>`
                : `<span style="color:#fff; font-weight:bold; opacity:0.8;">${job.company}</span>`;

            list.innerHTML += `
                <div style="padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between; align-items:center; ${isInterview ? 'border-left:4px solid #ff00ff; padding-left:10px; background:rgba(255,0,255,0.05);' : ''}">
                    <div style="display:flex; flex-direction:column;">
                        ${nameHTML}
                        <span style="font-size:0.7rem; opacity:0.4; margin-top:2px;">
                           ${isInterview ? '📅 Interview Set' : (isRejected ? '❌ Position Filled' : '📩 Applied')} • ${new Date(job.timestamp).toLocaleDateString()}
                        </span>
                    </div>
                    <span style="font-size:0.8rem; font-weight:bold; color:${color}; text-transform:uppercase;">${isInterview ? 'Interview' : job.status}</span>
                </div>`;
        });
    });
})();
</script>
