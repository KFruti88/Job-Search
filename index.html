<div id="wp-custom-wrapper">
    <div id="hustle-display-container">
        <!-- Dashboard Header -->
        <div id="career-milestone-header">
            <h2 class="hustle-title">Job Search Tracker</h2>
            <div class="milestone-sub">Last Day of Work: <strong>June 4th, 2025</strong></div>
            <div id="weeks-counter-box" class="weeks-glow">
                <span id="weeks-count">0</span> Weeks Since Last Job
            </div>
        </div>
        
        <!-- Statistics Badges -->
        <div class="hustle-platform-stats">
            <div class="platform-badge total-glow">Total: <span id="count-total">0</span></div>
            <div class="platform-badge applied-glow">Applied: <span id="count-applied">0</span></div>
            <div class="platform-badge interview-glow">Interviews: <span id="count-interview">0</span></div>
            <div class="platform-badge rejected-glow">Rejected: <span id="count-rejected">0</span></div>
        </div>

        <h3 class="activity-label">Activity Feed <span style="font-size: 0.6rem; opacity: 0.5; float: right; text-transform: none;">Yellow Ref# = Link • Tap for Details</span></h3>
        
        <!-- Job Entries Scrollable Area -->
        <div id="hustle-job-list-container">
            <div id="hustle-job-list">
                <div id="status-msg" style="text-align:center; padding:30px; opacity:0.6; font-style:italic;">
                    Connecting to Firebase...
                </div>
            </div>
        </div>
    </div>
</div>

<style>
/* Responsive Container - Fits Divi Mobile Specs (Section 50, Row 30) */
#wp-custom-wrapper #hustle-display-container {
    width: 100%; 
    max-width: 850px; 
    margin: 0 auto; 
    padding: 12px;
    background: #0a0a0a; 
    border: 2px solid #00f2ff; 
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); 
    color: #fff;
    font-family: 'Segoe UI', system-ui, sans-serif; 
    box-sizing: border-box;
}

.hustle-title { text-align: center; color: #00f2ff; text-transform: uppercase; margin: 0; font-size: 1.3rem; text-shadow: 0 0 8px #00f2ff; }
.milestone-sub { text-align: center; font-size: 0.7rem; opacity: 0.6; margin: 2px 0 8px; }

#weeks-counter-box {
    text-align: center; 
    padding: 8px; 
    background: rgba(255, 215, 0, 0.05);
    border-radius: 8px; 
    margin-bottom: 12px; 
    font-weight: bold; 
    font-size: 1.1rem; 
    border: 1px solid rgba(255, 215, 0, 0.2);
}
.weeks-glow { color: #ffd700; text-shadow: 0 0 8px rgba(255, 215, 0, 0.4); }

/* Quick-Stats Badges */
.hustle-platform-stats { display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
.platform-badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; border: 1px solid; font-size: 0.65rem; background: #000; }
.total-glow { border-color: #fff; color: #fff; }
.applied-glow { border-color: #007bff; color: #007bff; }
.interview-glow { border-color: #ffc107; color: #ffc107; }
.rejected-glow { border-color: #dc3545; color: #dc3545; }

/* List Styles */
.activity-label { font-size: 0.7rem; color: #00f2ff; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid rgba(0,242,255,0.2); padding-bottom: 5px; margin-top: 5px; }
.archive-divider { text-align: center; padding: 25px 0 10px; color: #ffd700; font-weight: bold; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 3px; border-top: 1px dashed rgba(255, 215, 0, 0.2); margin-top: 15px; }

#hustle-job-list-container { 
    max-height: 480px; 
    overflow-y: auto; 
    padding-right: 4px; 
}

/* Individual Job Entry Card */
.job-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 12px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; position: relative; }
.job-card:hover { background: rgba(255,255,255,0.05); border-color: #00f2ff; }

.job-header { display: flex; justify-content: space-between; align-items: flex-start; }
.job-title { font-weight: bold; font-size: 1rem; color: #fff; flex: 1; margin-right: 12px; line-height: 1.2; }

/* Right-Side Status Logic */
.status-date-box { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; min-width: 95px; }
.status-pill { font-size: 0.6rem; font-weight: 900; text-transform: uppercase; padding: 2px 8px; border-radius: 3px; border: 1px solid; text-align: center; width: 100%; }
.date-label { font-size: 0.6rem; opacity: 0.5; font-weight: bold; }

/* Yellow Clickable Reference (Column F) */
.ref-number-link { color: #ffc107; font-size: 0.75rem; font-weight: bold; text-decoration: underline; margin-top: 6px; display: inline-block; }

/* Description Drawer (Column D) */
.desc-dropdown { max-height: 0; overflow: hidden; opacity: 0; transition: all 0.3s ease; font-size: 0.8rem; color: #ccc; line-height: 1.4; }
.job-card.active .desc-dropdown { max-height: 500px; opacity: 1; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); }

/* Custom Scrollbar */
#hustle-job-list-container::-webkit-scrollbar { width: 3px; }
#hustle-job-list-container::-webkit-scrollbar-thumb { background: #00f2ff; border-radius: 10px; }

@media (max-width: 600px) {
    .job-title { font-size: 0.9rem; }
    .status-pill { font-size: 0.55rem; min-width: 85px; }
}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
(function() {
    // 1. Unemployment Milestone Logic
    const lastDay = new Date("June 4, 2025").getTime();
    function updateWeeks() {
        const now = new Date().getTime();
        document.getElementById('weeks-count').innerText = Math.max(0, Math.floor((now - lastDay) / (1000 * 60 * 60 * 24 * 7)));
    }
    updateWeeks();

    // 2. Firebase Connection
    const config = { databaseURL: "https://job-hustle-tracker-default-rtdb.firebaseio.com" };
    if (!firebase.apps.length) firebase.initializeApp(config, 'hustleViewer');
    const db = firebase.app('hustleViewer').database();

    function getTheme(s) {
        const st = (s || "").toLowerCase();
        if (st.includes("applied")) return { color: "#007bff", label: "Applied" };
        if (st.includes("interview")) return { color: "#ffc107", label: "Interview" };
        if (st.includes("rejected")) return { color: "#dc3545", label: "Rejected" };
        if (st.includes("hired")) return { color: "#28a745", label: "Hired" }; 
        return { color: "#00f2ff", label: s || "Update" };
    }

    function createCard(job) {
        const theme = getTheme(job.status);
        const card = document.createElement('div');
        card.className = 'job-card';
        card.onclick = (e) => { if (e.target.tagName !== 'A') card.classList.toggle('active'); };

        const ref = job.jobKey || job.referenceNumber || "View Link";
        const link = (job.jobUrl && job.jobUrl !== "#") ? job.jobUrl : "javascript:void(0)";
        const dateStr = job.timestamp ? new Date(job.timestamp).toLocaleDateString() : "Pending";

        card.innerHTML = `
            <div class="job-header">
                <div class="job-title">${job.company || "Company Record"}</div>
                <div class="status-date-box">
                    <div class="status-pill" style="color:${theme.color}; border-color:${theme.color}; font-weight:900;">${theme.label}</div>
                    <div class="date-label">${dateStr}</div>
                </div>
            </div>
            <a href="${link}" target="_blank" class="ref-number-link">Ref #: ${ref}</a>
            <div class="desc-dropdown">
                <div style="font-weight:bold; color:${theme.color}; font-size:0.65rem; margin-bottom:5px; text-transform:uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 2px;">Application Details:</div>
                ${job.snippet || "Tap to expand details."}
            </div>
        `;
        return card;
    }

    function processData(snapshot) {
        const rawData = snapshot.val();
        const list = document.getElementById('hustle-job-list');
        
        if (!rawData) {
            list.innerHTML = "<div style='text-align:center; padding:40px; opacity:0.3;'>No data found. Sync your sheet!</div>";
            return;
        }

        let allJobs = [];
        const seen = new Set();

        // Recursively find and flatten all job objects
        function findJobs(obj) {
            if (!obj || typeof obj !== 'object') return;
            if (obj.company && obj.timestamp) {
                const id = obj.company + "_" + obj.timestamp;
                if (!seen.has(id)) { allJobs.push(obj); seen.add(id); }
            } else {
                Object.values(obj).forEach(val => findJobs(val));
            }
        }
        findJobs(rawData);

        // Sort: Newest entries at top
        allJobs.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));

        const now = new Date().getTime();
        const recent = allJobs.filter(j => (now - (j.timestamp || 0)) < (8 * 24 * 60 * 60 * 1000));
        const archive = allJobs.filter(j => (now - (j.timestamp || 0)) >= (8 * 24 * 60 * 60 * 1000));

        updateStats(allJobs);
        list.innerHTML = "";
        recent.forEach(j => list.appendChild(createCard(j)));
        if (archive.length > 0) {
            const d = document.createElement('div'); d.className = 'archive-divider'; d.innerText = "— Archive (8+ Days Old) —";
            list.appendChild(d);
            archive.forEach(j => list.appendChild(createCard(j)));
        }
    }

    function updateStats(all) {
        let a = 0, i = 0, r = 0;
        all.forEach(j => {
            const s = (j.status || "").toLowerCase();
            if (s.includes("interview")) i++;
            else if (s.includes("rejected")) r++;
            else a++;
        });
        document.getElementById('count-total').innerText = all.length;
        document.getElementById('count-applied').innerText = a;
        document.getElementById('count-interview').innerText = i;
        document.getElementById('count-rejected').innerText = r;
    }

    db.ref("/").on("value", processData);
})();
</script>
